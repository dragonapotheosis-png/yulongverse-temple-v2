<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>与龙同行 · 神庙</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="temple" aria-label="与龙同行 · 神庙首页">
      <section class="stage" aria-live="polite">
        <div class="background background-a is-visible"></div>
        <div class="background background-b"></div>

        <div class="mist-layer" aria-hidden="true"></div>
        <div class="vignette-layer" aria-hidden="true"></div>

        <header class="title-layer">
          <img class="icon-img seal" src="./ui/icons/icon-logo.png" alt="" aria-hidden="true" />
          <h1>与龙同行 · 神庙</h1>
          <div class="ornament" aria-hidden="true">
            <span></span>
            <i></i>
            <span></span>
          </div>
          <p>请静心，再进入神庙</p>
        </header>

        <aside class="time-layer" aria-label="当前时段">
          <img class="icon-img time-icon" src="./ui/icons/icon-day.png" alt="" aria-hidden="true" />
          <h2 data-time-title>白天</h2>
          <p data-time-text>光落在殿前，<br />万物都在安静生长。</p>
          <div class="time-rule" aria-hidden="true">
            <span></span>
            <i></i>
            <span></span>
          </div>
        </aside>

        <nav class="icon-layer" aria-label="神庙入口导航">
          <a class="nav-item practice" href="#" aria-label="今日修行">
            <img class="icon-img practice-icon" src="./ui/icons/icon-meditation.png" alt="" aria-hidden="true" />
            <strong>今日修行</strong>
            <small>修心 · 修行 · 修日常</small>
          </a>

          <button class="enter-button" type="button" data-enter>
            <img class="icon-img enter-gem" src="./ui/icons/icon-enter.png" alt="" aria-hidden="true" />
            <span>点击香炉</span>
            <strong>进入神庙</strong>
          </button>

          <a class="nav-item scrolls" href="#" aria-label="卷轴阁">
            <img class="icon-img scroll-icon" src="./ui/icons/icon-scroll.png" alt="" aria-hidden="true" />
            <strong>卷轴阁</strong>
            <small>查看 · 收藏 · 回顾</small>
          </a>
        </nav>

        <footer class="blessing-layer">
          <div class="ornament" aria-hidden="true">
            <span></span>
            <i></i>
            <span></span>
          </div>
          <p>愿你心安，与龙同行。</p>
          <b aria-hidden="true"></b>
        </footer>

        <div class="audio-state" data-audio-state>环境音：待进入</div>
      </section>
    </main>

    <script src="./src/main.js"></script>
  </body>
</html>
