<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>与龙同行 · 神庙</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="temple" aria-label="与龙同行 · 神庙首页">
      <section class="stage" aria-label="神庙入口">
        <div class="background-layer background-a is-visible" aria-hidden="true"></div>
        <div class="background-layer background-b" aria-hidden="true"></div>
        <div class="lantern-glow lantern-glow-left" aria-hidden="true"></div>
        <div class="lantern-glow lantern-glow-right" aria-hidden="true"></div>
        <div class="lantern-glow lantern-glow-center" aria-hidden="true"></div>
        <img class="smoke" src="./assets/effects/smoke.png" alt="" aria-hidden="true" />

        <a class="hitbox hitbox-practice" href="#practice" aria-label="今日修行"></a>
        <button class="hitbox hitbox-enter" type="button" data-enter aria-label="进入神庙"></button>
        <a class="hitbox hitbox-scrolls" href="#scrolls" aria-label="卷轴阁"></a>
      </section>
    </main>

    <script src="./src/main.js"></script>
  </body>
</html>
