<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yulongverse Temple</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="temple" aria-label="Yulongverse Temple">
      <section class="stage" aria-label="Temple entrance">
        <div class="background-layer background-a is-visible" aria-hidden="true"></div>
        <div class="background-layer background-b" aria-hidden="true"></div>
        <div class="lantern-glow lantern-glow-left" aria-hidden="true"></div>
        <div class="lantern-glow lantern-glow-right" aria-hidden="true"></div>
        <div class="lantern-glow lantern-glow-center" aria-hidden="true"></div>
        <img class="smoke" src="./assets/effects/smoke.png" alt="" aria-hidden="true" />

        <a class="hitbox hitbox-practice" href="#practice" aria-label="Practice"></a>
        <button class="hitbox hitbox-enter" type="button" data-enter aria-label="Enter temple"></button>
        <a class="hitbox hitbox-scrolls" href="#scrolls" aria-label="Scroll archive"></a>
        <button class="audio-toggle" type="button" data-audio-toggle aria-label="Enable ambient audio">&#38899;</button>

        <div class="temple-transition" aria-hidden="true">
          <div class="transition-backdrop"></div>
          <p class="transition-message">神庙从不急着回答你。</p>
        </div>

        <section class="jiaobei-page" aria-label="掷筊抽签">
          <div class="inner-sanctum" aria-hidden="true"></div>
          <div class="jiaobei-content">
            <p class="jiaobei-kicker">内殿</p>
            <h1>请静心后，再向天地询问。</h1>
            <div class="jiaobei-cups" aria-hidden="true">
              <span class="jiaobei-cup cup-left"></span>
              <span class="jiaobei-cup cup-right"></span>
            </div>
            <button class="jiaobei-button" type="button" data-cast-jiaobei>掷筊</button>
            <p class="jiaobei-result" data-jiaobei-result></p>

            <article class="fortune-scroll" data-fortune-scroll hidden>
              <p class="fortune-meta" data-fortune-id></p>
              <h2 data-fortune-title></h2>
              <p class="fortune-energy" data-fortune-energy></p>
              <div class="fortune-section">
                <h3>签诗正文</h3>
                <p data-fortune-content></p>
              </div>
              <div class="fortune-section">
                <h3>白话解释</h3>
                <p data-fortune-interpretation></p>
              </div>
              <div class="fortune-section">
                <h3>今日提醒</h3>
                <p data-fortune-advice></p>
              </div>
            </article>
          </div>
        </section>
      </section>
    </main>

    <script src="./src/main.js"></script>
  </body>
</html>
